  - name: "BEST Pale Ale"
    type: "Grain"
    amount_kg: 7.0
    yield_pct: 80.0
    color_ebc: 6.0
  - name: "Viking Caramel Malt 50"
    type: "Grain"
    amount_kg: 0.15
    yield_pct: 74.0
    color_ebc: 50.0
  - name: "Viking Dextrin Malt"
    type: "Grain"
    amount_kg: 0.475
    yield_pct: 78.0
    color_ebc: 12.0
  - name: "Dextrose"
    type: "Sugar"
    amount_kg: 0.55
    yield_pct: 100.0
    color_ebc: 0.0

