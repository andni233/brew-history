title: "Claude the Elder"
date: 2026-04-06
status: planning
recipe_type: "All Grain"
brewers:
  - "Andreas Nilsson"
batch_size_l: 23
boil_time_min: 90
pre_ferment_gravity: 1.074
est_ibu: 100
est_color_ebc: 12
description: >-
  Clone of Russian River Brewing Company's Pliny the Elder, a West Coast
  Double IPA. Scaled to 23 L from the BYO/Vinnie Cilurzo recipe.
notes: >-
  Original recipe uses Warrior and Simcoe hops; these were substituted with
  Eureka! and Citra, respectively, due to availability at maltmagnus.se.
  This shifts the hop character from pine/passionfruit to tropical/citrus.

style:
  name: "Imperial IPA"
  category: "Double IPA"

